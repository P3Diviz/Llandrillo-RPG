<!doctype html>
<html lang="cy-en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Hero Profile · Proffil Arwr</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <!--
  ================================================================
  LECTURER DEMO FILE
  ================================================================
  Identical layout and comments to the student version.
  Fill in your own details live during the session.

  Differences from student file:
    Button text:  Gorffen ★
    Celebration:  congratulates the whole class
    Script:       celebrate-demo.js

  STEP 4.5 — Add your theme:
    <body class="theme-demo">
  ================================================================
  -->

  <!-- 🎨 STEP 3.5 — Change the word body to add your theme     -->
  <!-- Example:  <body class="theme-demo">                       -->
  <body>
    <main>
      <article class="card">
        <header class="card-header">
          <p class="guild-line">
            🐉 Urdd Llandrillo · Order of Llandrillo · Byd Cymru / Realm of
            Wales
          </p>
        </header>

        <div class="card-body">
          <section class="hero-section">
            <div class="hero-text">
              <!-- ✏️ STEP 1 — Type your h1 tag here                   -->
              <!-- Your teacher will show you how                       -->

              <!-- ✏️ STEP 2 — Type your p tag here                    -->
              <!-- Your teacher will show you how                       -->

              <!-- ✏️ STEP 3 — Type your img tag here                  -->
              <!-- Your teacher will show you how                       -->
            </div>
          </section>

          <!-- Stats — only change the data-points numbers             -->
          <!-- ✏️ STEP 5 — Change the numbers (0-4 each, total = 12)  -->
          <section class="stats-section" aria-label="Character stats">
            <div class="stat">
              <p class="stat-label">Dewrder / Courage</p>
              <div class="bar-track" role="progressbar" aria-label="Courage">
                <div class="bar-fill courage" data-points="2"></div>
              </div>
            </div>

            <div class="stat">
              <p class="stat-label">Doethineb / Wisdom</p>
              <div class="bar-track" role="progressbar" aria-label="Wisdom">
                <div class="bar-fill wisdom" data-points="2"></div>
              </div>
            </div>

            <div class="stat">
              <p class="stat-label">Cyflymder / Speed</p>
              <div class="bar-track" role="progressbar" aria-label="Speed">
                <div class="bar-fill speed" data-points="2"></div>
              </div>
            </div>

            <div class="stat">
              <p class="stat-label">Cryfder / Strength</p>
              <div class="bar-track" role="progressbar" aria-label="Strength">
                <div class="bar-fill strength" data-points="2"></div>
              </div>
            </div>

            <div class="stat">
              <p class="stat-label">Hud / Magic</p>
              <div class="bar-track" role="progressbar" aria-label="Magic">
                <div class="bar-fill magic" data-points="2"></div>
              </div>
            </div>

            <div class="stat">
              <p class="stat-label">Llechwraidd / Stealth</p>
              <div class="bar-track" role="progressbar" aria-label="Stealth">
                <div class="bar-fill stealth" data-points="2"></div>
              </div>
            </div>
          </section>

          <section class="power-box">
            <p class="power-label">Gallu Arbennig / Special Power</p>

            <!-- ✏️ STEP 4 — Type your p tag here                      -->
            <!-- Your teacher will show you how                         -->
          </section>
        </div>

        <footer class="card-footer">
          <p class="footer-college">Coleg Llandrillo · Academi Ddigidol 2025</p>

          <!-- ✏️ STEP 6 — Type your button tag here                   -->
          <!-- Your teacher will show you how                           -->
        </footer>
      </article>
    </main>

    <script src="celebrate-demo.js"></script>
  </body>
</html>
